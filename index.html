<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Device Info</title>
  <style>
    :root {
      --bg: #f2f2f7;
      --card: #ffffff;
      --text: #1d1d1f;
      --text-secondary: #86868b;
      --accent: #0071e3;
      --accent-active: #005bb5;
      --border: #e5e5ea;
      --success: #34c759;
      --radius: 14px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --card: #1c1c1e;
        --text: #ffffff;
        --text-secondary: #8e8e93;
        --border: #38383a;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html {
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      padding: calc(var(--safe-top) + 20px) 16px calc(var(--safe-bottom) + 40px);
      min-height: 100dvh;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      padding: 20px 4px 8px;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      padding: 0 4px 24px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      padding: 24px 4px 8px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 16px;
    }

    .row + .row {
      border-top: 0.5px solid var(--border);
    }

    .row .label {
      font-size: 17px;
      color: var(--text);
    }

    .row .value {
      font-size: 17px;
      color: var(--text-secondary);
      text-align: right;
      max-width: 60%;
      word-break: break-word;
    }

    .row .value.green {
      color: var(--success);
    }
  </style>
</head>
<body>

  <h1>Device Info</h1>
  <p class="subtitle">What your browser reveals on first visit.</p>

  <div class="section-title">Device</div>
  <div class="card">
    <div class="row"><span class="label">Platform</span><span class="value" id="platform"></span></div>
    <div class="row"><span class="label">User Agent</span><span class="value" id="ua"></span></div>
    <div class="row"><span class="label">Language</span><span class="value" id="lang"></span></div>
    <div class="row"><span class="label">CPU Cores</span><span class="value" id="cores"></span></div>
    <div class="row"><span class="label">Memory (GB)</span><span class="value" id="mem"></span></div>
    <div class="row"><span class="label">Touch Support</span><span class="value" id="touch"></span></div>
  </div>

  <div class="section-title">Screen</div>
  <div class="card">
    <div class="row"><span class="label">Width</span><span class="value" id="width"></span></div>
    <div class="row"><span class="label">Height</span><span class="value" id="height"></span></div>
    <div class="row"><span class="label">Pixel Ratio</span><span class="value" id="dpr"></span></div>
    <div class="row"><span class="label">Color Depth</span><span class="value" id="color"></span></div>
    <div class="row"><span class="label">Dark Mode</span><span class="value green" id="dark"></span></div>
  </div>

  <div class="section-title">Network</div>
  <div class="card">
    <div class="row"><span class="label">Status</span><span class="value green" id="online"></span></div>
  </div>

  <script>
    document.getElementById('platform').textContent = navigator.platform || '—';
    document.getElementById('ua').textContent = navigator.userAgent;
    document.getElementById('lang').textContent = navigator.language;
    document.getElementById('cores').textContent = navigator.hardwareConcurrency || '—';
    document.getElementById('mem').textContent = navigator.deviceMemory ? navigator.deviceMemory + ' GB' : '—';
    document.getElementById('touch').textContent = ('ontouchstart' in window) ? 'Yes' : 'No';

    document.getElementById('width').textContent = screen.width + 'px';
    document.getElementById('height').textContent = screen.height + 'px';
    document.getElementById('dpr').textContent = window.devicePixelRatio + 'x';
    document.getElementById('color').textContent = screen.colorDepth + '-bit';
    document.getElementById('dark').textContent = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'On' : 'Off';

    document.getElementById('online').textContent = navigator.onLine ? 'Online' : 'Offline';
  </script>
</body>
</html>
